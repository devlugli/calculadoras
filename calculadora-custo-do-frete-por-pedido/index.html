<head>

<body>
  <div class="container">
    <p><a href="/">Voltar para a p&aacute;gina inicial</a></p>

    <div class="resumo-topo"><div class="resumo-topo-titulo">Frete por pedido</div><div class="resumo-topo-valor" id="resumoTopoValor">-</div><div class="resumo-topo-texto" id="resumoTopoTexto">Preencha os valores operacionais.</div></div>
  </div>

  <script src="../assets/js/populares.js"></script><script src="./script.js"></script><script>renderizarCalculadorasPopulares();</script>
